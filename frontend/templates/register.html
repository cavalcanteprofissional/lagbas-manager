{% extends "base.html" %}

{% block login_content %}
<style>
    .login-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0070b8 0%, #4da3e8 100%);
        padding: 20px;
    }
    .login-card {
        width: 100%;
        max-width: 420px;
        border: none;
        border-radius: 16px;
    }
    .login-card .card-body {
        padding: 2rem;
    }
    @media (max-width: 576px) {
        .login-card .card-body {
            padding: 1.5rem;
        }
    }
</style>

<div class="login-container">
    <div class="card login-card shadow-lg">
        <div class="card-body">
            <div class="text-center mb-4">
                <h2><i class="bi bi-moisture text-primary"></i> LabGas</h2>
                <p class="text-muted mb-0">Criar nova conta</p>
            </div>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ 'danger' if category == 'danger' else 'success' }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <form method="POST" action="{{ url_for('auth.register') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control form-control-lg" placeholder="seu@email.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Nome Completo</label>
                    <input type="text" name="nome" class="form-control form-control-lg" placeholder="Seu nome">
                </div>
                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    <input type="password" name="password" class="form-control form-control-lg" placeholder="Mínimo 6 caracteres" required minlength="6">
                </div>
                <div class="mb-3">
                    <label class="form-label">Confirmar Senha</label>
                    <input type="password" name="confirm_password" class="form-control form-control-lg" placeholder="Confirme sua senha" required>
                </div>
                <button type="submit" class="btn btn-success btn-lg w-100 mb-3">
                    <i class="bi bi-person-plus me-2"></i> Criar Conta
                </button>
            </form>
            
            <div class="text-center mt-3">
                <p class="mb-0">Já tem conta? <a href="{{ url_for('auth.login') }}" class="fw-bold">Entrar</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
